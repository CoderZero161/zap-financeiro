<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financeiro - Importador PRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .card-header { background: #075e54; color: white; font-weight: bold; }
        .btn-upload { background: #128c7e; color: white; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="card mb-4 shadow-sm">
        <div class="card-header"><i class="bi bi-file-earmark-arrow-up me-2"></i>Importar Dados (.txt)</div>
        <div class="card-body">
            <p class="small text-muted">Selecione o arquivo controle.txt para popular o sistema automaticamente.</p>
            <input type="file" id="fileInput" class="form-control mb-3" accept=".txt">
            <button onclick="processarArquivo()" class="btn btn-upload w-100">Carregar e Sincronizar</button>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>Dono</th>
                        <th>Grupo</th>
                        <th>Plano</th>
                        <th>Valor</th>
                        <th>Vencimento</th>
                    </tr>
                </thead>
                <tbody id="tabelaDados"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
async function processarArquivo() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return alert("Selecione o arquivo!");

    const texto = await file.text();
    const linhas = texto.split('\n');
    const tabela = document.getElementById('tabelaDados');
    tabela.innerHTML = "";

    linhas.forEach(linha => {
        if (linha.trim() === "" || linha.includes("nome dono")) return;

        // Tenta dividir por '=' ou por '/', removendo espaços extras
        let partes = linha.includes('=') ? linha.split('=') : linha.split('/');
        
        if (partes.length >= 2) {
            const dado = {
                dono: partes[0]?.trim() || "---",
                grupo: partes[1]?.trim() || "---",
                plano: partes[2]?.trim() || "Semanal",
                valor: partes[3]?.trim() || "0",
                vencimento: partes[4]?.trim() || "---"
            };

            // Adiciona na tela
            const row = `<tr>
                <td><strong>${dado.dono}</strong></td>
                <td>${dado.grupo}</td>
                <td><span class="badge bg-info">${dado.plano}</span></td>
                <td>R$ ${dado.valor}</td>
                <td><span class="text-danger">${dado.vencimento}</span></td>
            </tr>`;
            tabela.innerHTML += row;

            // Enviar para o Google Sheets (Exemplo de chamada)
            // enviarParaPlanilha(dado);
        }
    });
}

function enviarParaPlanilha(objeto) {
    const urlPlanilha = "SUA_URL_DO_DEPLOY_AQUI"; 
    fetch(urlPlanilha, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(objeto)
    });
}
</script>
</body>
</html>
