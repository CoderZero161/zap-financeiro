<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zap Fin - Oficial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --whatsapp-dark: #075E54; --whatsapp-green: #25D366; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding-top: 60px; }
        .navbar-custom { background: var(--whatsapp-dark); color: white; position: fixed; top: 0; width: 100%; z-index: 1000; padding: 10px 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .card-lista { background: white; border-bottom: 1px solid #e9ecef; display: flex; align-items: center; padding: 12px 15px; }
        .btn-edit-icon { color: #007bff; font-size: 1.2rem; margin-right: 15px; cursor: pointer; }
        .content-body { flex-grow: 1; min-width: 0; cursor: pointer; }
        .txt-nome { font-weight: 700; font-size: 0.95rem; color: #1c1e21; margin: 0; }
        .txt-valor { font-weight: 800; color: #28a745; font-size: 0.9rem; }
        .txt-info { font-size: 0.75rem; color: #65676b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; margin-top: 2px; }
        .btn-stat { width: 95px; height: 32px; border-radius: 6px; font-size: 10px; font-weight: 800; border: none; text-transform: uppercase; }
        .st-pago { background: #dcf8c6; color: #075e54; border: 1px solid #c7e8b0; }
        .st-pendente { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .resumo-fixed { background: white; padding: 10px; border-bottom: 1px solid #ddd; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="navbar-custom d-flex justify-content-between align-items-center">
    <span class="fw-bold">ZAP FINANCEIRO</span>
    <button class="btn btn-success btn-sm fw-bold" onclick="abrirModalAdd()">+ NOVO</button>
</div>

<div class="resumo-fixed d-flex justify-content-around text-center shadow-sm">
    <div><small class="text-muted d-block" style="font-size: 9px;">TOTAL RECEBIDO</small><b id="totalPago" class="text-success">R$ 0</b></div>
    <div><small class="text-muted d-block" style="font-size: 9px;">TOTAL PENDENTE</small><b id="totalPend" class="text-danger">R$ 0</b></div>
</div>

<div id="renderLista"></div>

<div class="modal fade" id="modalEdicao" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header text-white" style="background: var(--whatsapp-dark)">
                <h6 class="modal-title" id="mTitulo">Editar Registro</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-3">
                <input type="hidden" id="mId">
                <div class="row g-2">
                    <div class="col-12"><label class="small fw-bold">Dono</label><input type="text" id="mDono" class="form-control"></div>
                    <div class="col-12"><label class="small fw-bold">Grupo</label><input type="text" id="mGrupo" class="form-control"></div>
                    <div class="col-6"><label class="small fw-bold">Valor</label><input type="number" id="mValor" class="form-control"></div>
                    <div class="col-6"><label class="small fw-bold">Vencimento</label><input type="text" id="mVence" class="form-control"></div>
                    <div class="col-12"><label class="small fw-bold">Plano</label>
                        <select id="mPlano" class="form-select">
                            <option value="semanal">Semanal</option>
                            <option value="quinzena">Quinzena</option>
                            <option value="Mensal">Mensal</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-link text-danger me-auto small" onclick="excluirRegistro()">Apagar</button>
                <button type="button" class="btn btn-success btn-sm px-4" onclick="salvar()">SALVAR</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://zapfin-816b8-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const modal = new bootstrap.Modal(document.getElementById('modalEdicao'));

    // Renderização da lista
    db.ref('clientes').on('value', (snapshot) => {
        const container = document.getElementById('renderLista');
        let html = "";
        let sP = 0, sA = 0;

        snapshot.forEach((item) => {
            const c = item.val();
            const id = item.key;
            const v = parseFloat(c.valor || 0);
            const pago = c.status === "Pago";

            pago ? sP += v : sA += v;

            html += `
                <div class="card-lista">
                    <i class="bi bi-pencil-square btn-edit-icon" onclick="abrirEdicao('${id}')"></i>
                    <div class="content-body" onclick="abrirEdicao('${id}')">
                        <div class="linha-cabecalho">
                            <span class="txt-nome">${c.nome_dono}</span>
                            <span class="txt-valor">R$ ${v}</span>
                        </div>
                        <span class="txt-info">${c.nome_grupo} • ${c.vencimento} • ${c.plano}</span>
                    </div>
                    <button id="btn-${id}" class="btn-stat ${pago ? 'st-pago' : 'st-pendente'}" 
                            onclick="mudarStatus('${id}')">
                        ${pago ? 'PAGO' : 'PENDENTE'}
                    </button>
                </div>`;
        });
        container.innerHTML = html;
        document.getElementById('totalPago').innerText = "R$ " + sP;
        document.getElementById('totalPend').innerText = "R$ " + sA;
    });

    // Função de Status solicitada (com sua regra de negócio)
    function mudarStatus(id) {
        const btn = document.getElementById('btn-' + id);
        const statusAtual = btn.innerText === "PAGO" ? "Pago" : "Pendente";
        const novoStatus = statusAtual === "Pago" ? "Pendente" : "Pago";

        // Atualiza visual imediatamente
        if(novoStatus === "Pago") {
            btn.className = "btn-stat st-pago";
            btn.innerText = "PAGO";
        } else {
            btn.className = "btn-stat st-pendente";
            btn.innerText = "PENDENTE";
        }

        btn.disabled = true;

        // Grava no Firebase
        db.ref('clientes/' + id).update({ status: novoStatus })
            .finally(() => {
                // Pequeno delay para garantir que a rede estabilizou
                setTimeout(() => { btn.disabled = false; }, 500);
            });
    }

    // Outras funções
    function abrirEdicao(id) {
        db.ref('clientes/' + id).once('value').then(s => {
            const c = s.val();
            document.getElementById('mId').value = id;
            document.getElementById('mDono').value = c.nome_dono;
            document.getElementById('mGrupo').value = c.nome_grupo;
            document.getElementById('mValor').value = c.valor;
            document.getElementById('mVence').value = c.vencimento;
            document.getElementById('mPlano').value = c.plano;
            modal.show();
        });
    }

    function abrirModalAdd() {
        document.getElementById('mId').value = "";
        document.getElementById('mDono').value = "";
        document.getElementById('mGrupo').value = "";
        document.getElementById('mValor').value = "";
        document.getElementById('mVence').value = "";
        modal.show();
    }

    function salvar() {
        const id = document.getElementById('mId').value;
        const dados = {
            nome_dono: document.getElementById('mDono').value,
            nome_grupo: document.getElementById('mGrupo').value,
            valor: document.getElementById('mValor').value,
            vencimento: document.getElementById('mVence').value,
            plano: document.getElementById('mPlano').value
        };
        id ? db.ref('clientes/' + id).update(dados) : db.ref('clientes').push({...dados, status: "Pendente"});
        modal.hide();
    }

    function excluirRegistro() {
        const id = document.getElementById('mId').value;
        if(id && confirm("Apagar?")) { db.ref('clientes/' + id).remove(); modal.hide(); }
    }
</script>
</body>
</html>
