<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zap Fin - Gestão Elite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; color: #333; }
        .nav-zap { background: #075E54; color: white; padding: 15px; font-weight: bold; }
        /* Layout de Lista Compacta */
        .lista-item { 
            background: white; 
            border-bottom: 1px solid #eee; 
            padding: 12px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .lista-item:last-child { border-bottom: none; }
        .info-principal h6 { margin: 0; font-size: 15px; font-weight: 600; }
        .info-principal p { margin: 0; font-size: 12px; color: #666; }
        .valor-tag { font-weight: bold; color: #2e7d32; font-size: 14px; }
        
        .status-btn { 
            border-radius: 6px; 
            padding: 5px 12px; 
            font-size: 11px; 
            font-weight: bold; 
            border: none; 
            text-transform: uppercase;
        }
        .btn-pendente { background: #fff3e0; color: #ef6c00; }
        .btn-pago { background: #e8f5e9; color: #2e7d32; }
        
        .resumo-topo { background: white; padding: 15px; border-bottom: 2px solid #075E54; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="nav-zap d-flex justify-content-between align-items-center shadow-sm">
    <span><i class="bi bi-wallet2"></i> CONTROLE ZAP</span>
    <button class="btn btn-light btn-sm fw-bold" onclick="novoCliente()">+ NOVO</button>
</div>

<div class="resumo-topo d-flex justify-content-around text-center shadow-sm">
    <div><small class="text-muted d-block">TOTAL PAGO</small><b id="resP" class="text-success">R$ 0</b></div>
    <div><small class="text-muted d-block">PENDENTE</small><b id="resA" class="text-warning">R$ 0</b></div>
</div>

<div class="container-fluid p-0" id="listaCorpo">
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://zapfin-816b8-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('clientes').on('value', (snapshot) => {
        const container = document.getElementById('listaCorpo');
        let html = "";
        let somaP = 0, somaA = 0;

        snapshot.forEach((item) => {
            const c = item.val();
            const id = item.key;
            const v = parseFloat(c.valor || 0);
            const pago = c.status === "Pago";

            if(pago) somaP += v; else somaA += v;

            html += `
                <div class="lista-item">
                    <div class="info-principal" onclick="editar('${id}', '${c.nome_dono}', '${c.valor}')">
                        <h6>${c.nome_dono} <span class="valor-tag">R$ ${v}</span></h6>
                        <p>${c.nome_grupo} • ${c.vencimento || 'S/D'} • ${c.plano}</p>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="status-btn ${pago ? 'btn-pago' : 'btn-pendente'}" 
                                onclick="toggleStatus('${id}', '${c.status}')">
                            ${pago ? 'PAGO' : 'PENDENTE'}
                        </button>
                        <i class="bi bi-trash text-muted" onclick="excluir('${id}')" style="cursor:pointer"></i>
                    </div>
                </div>`;
        });

        container.innerHTML = html;
        document.getElementById('resP').innerText = "R$ " + somaP;
        document.getElementById('resA').innerText = "R$ " + somaA;
    });

    function toggleStatus(id, atual) {
        const novo = atual === "Pago" ? "Pendente" : "Pago";
        db.ref('clientes/' + id).update({ status: novo });
    }

    function editar(id, nome, valor) {
        const nV = prompt(`Novo valor para ${nome}:`, valor);
        if(nV) db.ref('clientes/' + id).update({ valor: nV });
    }

    function excluir(id) {
        if(confirm("Excluir cliente?")) db.ref('clientes/' + id).remove();
    }

    function novoCliente() {
        const n = prompt("Nome do Dono:");
        const v = prompt("Valor (R$):");
        if(n && v) db.ref('clientes').push({ nome_dono: n, valor: v, status: "Pendente", nome_grupo: "Geral" });
    }
</script>
</body>
</html>
