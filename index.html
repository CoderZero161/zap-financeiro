<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zap Fin - Gestão Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding-top: 70px; }
        .header-zap { background: #075E54; color: white; position: fixed; top: 0; width: 100%; z-index: 1050; padding: 12px 20px; border-bottom: 2px solid #128C7E; }
        
        .lista-container { background: white; border-radius: 10px; overflow: hidden; margin-top: 10px; }
        .item-cliente { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 12px 15px; border-bottom: 1px solid #f0f0f0; 
        }
        .item-cliente:last-child { border-bottom: none; }
        
        .info-box { flex: 1; min-width: 0; }
        .nome-dono { font-weight: 700; color: #2c3e50; font-size: 14px; margin-right: 5px; }
        .valor-txt { color: #198754; font-weight: 800; font-size: 14px; }
        .detalhes-sub { 
            font-size: 11px; color: #7f8c8d; display: block;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            max-width: 95%;
        }

        .btn-status { 
            width: 85px; font-size: 10px; font-weight: 800; border-radius: 5px; 
            padding: 5px 0; border: none; transition: 0.2s;
        }
        .bg-pago { background: #e8f5e9; color: #2e7d32; }
        .bg-pendente { background: #fff3e0; color: #ef6c00; }

        .btn-edit { color: #3498db; cursor: pointer; font-size: 18px; margin-right: 10px; }
        .resumo-topo { background: white; padding: 15px; margin-bottom: 10px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="header-zap d-flex justify-content-between align-items-center shadow">
    <span class="fw-bold">🛡️ ZAP FIN PRO</span>
    <button class="btn btn-light btn-sm fw-bold" onclick="abrirModalAdd()">+ NOVO</button>
</div>

<div class="resumo-topo d-flex justify-content-around text-center shadow-sm">
    <div><small class="text-muted d-block" style="font-size: 10px;">RECEBIDO</small><b id="resP" class="text-success">R$ 0</b></div>
    <div><small class="text-muted d-block" style="font-size: 10px;">PENDENTE</small><b id="resA" class="text-danger">R$ 0</b></div>
</div>

<div class="container-fluid">
    <div id="listaItems" class="lista-container shadow-sm">
        <div class="text-center p-5 text-muted">Sincronizando dados...</div>
    </div>
</div>

<div class="modal fade" id="modalEdicao" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="tituloModal">Editar Cliente</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editId">
        <div class="mb-3">
            <label class="form-label small fw-bold">Nome do Dono</label>
            <input type="text" id="editDono" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Nome do Grupo</label>
            <input type="text" id="editGrupo" class="form-control">
        </div>
        <div class="row">
            <div class="col-6 mb-3">
                <label class="form-label small fw-bold">Valor (R$)</label>
                <input type="number" id="editValor" class="form-control">
            </div>
            <div class="col-6 mb-3">
                <label class="form-label small fw-bold">Vencimento</label>
                <input type="text" id="editVence" class="form-control" placeholder="Ex: Quinta">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label small fw-bold">Plano</label>
            <select id="editPlano" class="form-select">
                <option value="semanal">Semanal</option>
                <option value="quinzena">Quinzena</option>
                <option value="Mensal">Mensal</option>
            </select>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline-danger" onclick="confirmarExclusao()">Excluir</button>
        <button type="button" class="btn btn-success w-50" onclick="salvarAlteracoes()">SALVAR</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://zapfin-816b8-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const modalUI = new bootstrap.Modal(document.getElementById('modalEdicao'));

    // CARREGAR DADOS
    db.ref('clientes').on('value', (snapshot) => {
        const container = document.getElementById('listaItems');
        let html = "";
        let somaP = 0, somaA = 0;

        snapshot.forEach((item) => {
            const c = item.val();
            const id = item.key;
            const v = parseFloat(c.valor || 0);
            const pago = c.status === "Pago";

            if(pago) somaP += v; else somaA += v;

            html += `
                <div class="item-cliente">
                    <i class="bi bi-pencil-square btn-edit" onclick="abrirEdicao('${id}')"></i>
                    <div class="info-box">
                        <span class="nome-dono">${c.nome_dono}</span>
                        <span class="valor-txt">R$ ${v}</span>
                        <span class="detalhes-sub">${c.nome_grupo} | ${c.vencimento} | ${c.plano}</span>
                    </div>
                    <button class="btn-status ${pago ? 'bg-pago' : 'bg-pendente'}" onclick="toggleStatus('${id}', '${c.status}')">
                        ${pago ? 'PAGO' : 'PENDENTE'}
                    </button>
                </div>`;
        });

        container.innerHTML = html || '<div class="p-4 text-center">Nenhum cliente encontrado.</div>';
        document.getElementById('resP').innerText = "R$ " + somaP;
        document.getElementById('resA').innerText = "R$ " + somaA;
    });

    function toggleStatus(id, atual) {
        const novo = atual === "Pago" ? "Pendente" : "Pago";
        db.ref('clientes/' + id).update({ status: novo });
    }

    function abrirEdicao(id) {
        db.ref('clientes/' + id).once('value').then((s) => {
            const c = s.val();
            document.getElementById('editId').value = id;
            document.getElementById('editDono').value = c.nome_dono;
            document.getElementById('editGrupo').value = c.nome_grupo;
            document.getElementById('editValor').value = c.valor;
            document.getElementById('editVence').value = c.vencimento;
            document.getElementById('editPlano').value = c.plano;
            document.getElementById('tituloModal').innerText = "Editar Cliente";
            modalUI.show();
        });
    }

    function abrirModalAdd() {
        document.getElementById('editId').value = "";
        document.getElementById('editDono').value = "";
        document.getElementById('editGrupo').value = "";
        document.getElementById('editValor').value = "";
        document.getElementById('editVence').value = "";
        document.getElementById('tituloModal').innerText = "Novo Cliente";
        modalUI.show();
    }

    function salvarAlteracoes() {
        const id = document.getElementById('editId').value;
        const dados = {
            nome_dono: document.getElementById('editDono').value,
            nome_grupo: document.getElementById('editGrupo').value,
            valor: document.getElementById('editValor').value,
            vencimento: document.getElementById('editVence').value,
            plano: document.getElementById('editPlano').value
        };

        if(id) {
            db.ref('clientes/' + id).update(dados);
        } else {
            dados.status = "Pendente";
            db.ref('clientes').push(dados);
        }
        modalUI.hide();
    }

    function confirmarExclusao() {
        const id = document.getElementById('editId').value;
        if(id && confirm("Deseja realmente excluir?")) {
            db.ref('clientes/' + id).remove();
            modalUI.hide();
        }
    }
</script>
</body>
</html>
